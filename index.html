<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私たちの日常</title>
    
    <!-- Noto Sans(ゴシック)とNoto Serif(明朝)を読み込み -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        serif: ['"Noto Serif JP"', 'serif'],
                    },
                    colors: {
                        primary: '#4a4a4a',
                        secondary: '#8a8a8a',
                        accent: '#d4a373',
                        background: '#ffffff',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #ffffff;
            color: #4a4a4a;
        }

        /* SVGフィルター（水彩の滲み） */
        .watercolor-blob {
            filter: url('#watercolor-edge');
            mix-blend-mode: multiply;
        }

        /* 飛沫（スプラッター）レイヤー */
        .splatter-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            mix-blend-mode: multiply;
            opacity: 0.85;
            background-repeat: no-repeat;
        }

        /* 各色の飛沫のランダムな配置 */
        .splatter-orange {
            background-image: 
                radial-gradient(circle at 18% 15%, rgba(249, 115, 22, 0.8) 0, rgba(249, 115, 22, 0.8) 3px, transparent 4px),
                radial-gradient(circle at 25% 12%, rgba(251, 191, 36, 0.7) 0, rgba(251, 191, 36, 0.7) 2px, transparent 3px),
                radial-gradient(circle at 12% 25%, rgba(234, 88, 12, 0.9) 0, rgba(234, 88, 12, 0.9) 4px, transparent 5px),
                radial-gradient(circle at 28% 22%, rgba(249, 115, 22, 0.6) 0, rgba(249, 115, 22, 0.6) 1.5px, transparent 2.5px),
                radial-gradient(circle at 15% 30%, rgba(251, 146, 60, 0.8) 0, rgba(251, 146, 60, 0.8) 2px, transparent 3px),
                radial-gradient(circle at 8% 18%, rgba(251, 191, 36, 0.7) 0, rgba(251, 191, 36, 0.7) 2.5px, transparent 3.5px),
                radial-gradient(circle at 22% 32%, rgba(234, 88, 12, 0.8) 0, rgba(234, 88, 12, 0.8) 1.5px, transparent 2.5px),
                radial-gradient(circle at 32% 18%, rgba(249, 115, 22, 0.5) 0, rgba(249, 115, 22, 0.5) 3px, transparent 4px);
        }

        .splatter-blue {
            background-image: 
                radial-gradient(circle at 75% 18%, rgba(14, 165, 233, 0.8) 0, rgba(14, 165, 233, 0.8) 3px, transparent 4px),
                radial-gradient(circle at 85% 12%, rgba(56, 189, 248, 0.7) 0, rgba(56, 189, 248, 0.7) 2px, transparent 3px),
                radial-gradient(circle at 88% 28%, rgba(2, 132, 199, 0.9) 0, rgba(2, 132, 199, 0.9) 4px, transparent 5px),
                radial-gradient(circle at 68% 25%, rgba(14, 165, 233, 0.6) 0, rgba(14, 165, 233, 0.6) 1.5px, transparent 2.5px),
                radial-gradient(circle at 82% 35%, rgba(56, 189, 248, 0.8) 0, rgba(56, 189, 248, 0.8) 2px, transparent 3px),
                radial-gradient(circle at 92% 20%, rgba(2, 132, 199, 0.7) 0, rgba(2, 132, 199, 0.7) 2.5px, transparent 3.5px),
                radial-gradient(circle at 78% 8%, rgba(14, 165, 233, 0.8) 0, rgba(14, 165, 233, 0.8) 1.5px, transparent 2.5px),
                radial-gradient(circle at 65% 15%, rgba(56, 189, 248, 0.5) 0, rgba(56, 189, 248, 0.5) 3px, transparent 4px);
        }

        .splatter-red {
            background-image: 
                radial-gradient(circle at 22% 75%, rgba(225, 29, 72, 0.8) 0, rgba(225, 29, 72, 0.8) 3px, transparent 4px),
                radial-gradient(circle at 12% 82%, rgba(244, 63, 94, 0.7) 0, rgba(244, 63, 94, 0.7) 2px, transparent 3px),
                radial-gradient(circle at 28% 88%, rgba(190, 18, 60, 0.9) 0, rgba(190, 18, 60, 0.9) 4px, transparent 5px),
                radial-gradient(circle at 15% 68%, rgba(225, 29, 72, 0.6) 0, rgba(225, 29, 72, 0.6) 1.5px, transparent 2.5px),
                radial-gradient(circle at 35% 80%, rgba(251, 113, 133, 0.8) 0, rgba(251, 113, 133, 0.8) 2px, transparent 3px),
                radial-gradient(circle at 8% 78%, rgba(190, 18, 60, 0.7) 0, rgba(190, 18, 60, 0.7) 2.5px, transparent 3.5px),
                radial-gradient(circle at 25% 92%, rgba(225, 29, 72, 0.8) 0, rgba(225, 29, 72, 0.8) 1.5px, transparent 2.5px),
                radial-gradient(circle at 32% 65%, rgba(244, 63, 94, 0.5) 0, rgba(244, 63, 94, 0.5) 3px, transparent 4px);
        }

        .splatter-purple {
            background-image: 
                radial-gradient(circle at 80% 80%, rgba(147, 51, 234, 0.8) 0, rgba(147, 51, 234, 0.8) 3px, transparent 4px),
                radial-gradient(circle at 88% 72%, rgba(168, 85, 247, 0.7) 0, rgba(168, 85, 247, 0.7) 2px, transparent 3px),
                radial-gradient(circle at 72% 88%, rgba(126, 34, 206, 0.9) 0, rgba(126, 34, 206, 0.9) 4px, transparent 5px),
                radial-gradient(circle at 85% 92%, rgba(147, 51, 234, 0.6) 0, rgba(147, 51, 234, 0.6) 1.5px, transparent 2.5px),
                radial-gradient(circle at 68% 75%, rgba(192, 132, 252, 0.8) 0, rgba(192, 132, 252, 0.8) 2px, transparent 3px),
                radial-gradient(circle at 95% 85%, rgba(126, 34, 206, 0.7) 0, rgba(126, 34, 206, 0.7) 2.5px, transparent 3.5px),
                radial-gradient(circle at 75% 68%, rgba(147, 51, 234, 0.8) 0, rgba(147, 51, 234, 0.8) 1.5px, transparent 2.5px),
                radial-gradient(circle at 92% 65%, rgba(168, 85, 247, 0.5) 0, rgba(168, 85, 247, 0.5) 3px, transparent 4px);
        }

        .paper-texture {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
        }

        .title-shadow {
            text-shadow: 0 4px 20px rgba(255,255,255,0.9), 0 0 10px rgba(255,255,255,0.7);
            cursor: default;
            user-select: none;
        }

        .carousel-inner {
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .fade-transition {
            transition: opacity 0.3s ease-in-out;
        }

        .editable[contenteditable="true"] {
            border-bottom: 1px dashed rgba(200, 200, 200, 0.8);
            background-color: rgba(200, 200, 200, 0.15);
            outline: none;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: text;
        }
        
        .edit-panel { display: none; }
        .edit-mode .edit-panel { display: block; }
        .edit-mode a.affiliate-link { pointer-events: none; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e2e2; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d4a373; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1);
        }

        /* 独自のモーダルダイアログ用スタイル */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans antialiased relative">

    <!-- 水彩エフェクト用のSVGフィルター -->
    <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
        <defs>
            <filter id="watercolor-edge" x="-20%" y="-20%" width="140%" height="140%">
                <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="4" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="50" xChannelSelector="R" yChannelSelector="G" result="displaced" />
                <feGaussianBlur in="displaced" stdDeviation="8" result="blurred" />
                <feComponentTransfer in="blurred" result="watercolor">
                    <feFuncA type="linear" slope="1.2" intercept="-0.1" />
                </feComponentTransfer>
            </filter>
        </defs>
    </svg>

    <!-- アートな水彩パレット風背景 -->
    <div class="fixed inset-0 z-[-1] overflow-hidden bg-white pointer-events-none">
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-[80vw] h-[80vw] max-w-[800px] max-h-[800px] bg-gray-50 rounded-full blur-[100px] opacity-50"></div>
        </div>
        <!-- 水彩の色だまり -->
        <div class="absolute top-[5%] left-[5%] w-[35vw] h-[35vw] max-w-[400px] max-h-[400px] bg-gradient-to-br from-orange-400 to-yellow-400 rounded-full watercolor-blob opacity-70 transform -rotate-12"></div>
        <div class="absolute top-[10%] right-[5%] w-[40vw] h-[40vw] max-w-[450px] max-h-[450px] bg-gradient-to-bl from-cyan-400 to-blue-500 rounded-full watercolor-blob opacity-60 transform rotate-12"></div>
        <div class="absolute bottom-[10%] left-[10%] w-[30vw] h-[30vw] max-w-[350px] max-h-[350px] bg-gradient-to-tr from-rose-500 to-red-400 rounded-full watercolor-blob opacity-65 transform rotate-45"></div>
        <div class="absolute bottom-[5%] right-[10%] w-[35vw] h-[35vw] max-w-[400px] max-h-[400px] bg-gradient-to-tl from-purple-500 to-fuchsia-400 rounded-full watercolor-blob opacity-70 transform -rotate-45"></div>
        <!-- 飛沫レイヤー -->
        <div class="splatter-layer splatter-orange"></div>
        <div class="splatter-layer splatter-blue"></div>
        <div class="splatter-layer splatter-red"></div>
        <div class="splatter-layer splatter-purple"></div>
        <!-- キャンバス質感 -->
        <div class="absolute inset-0 paper-texture mix-blend-multiply opacity-80"></div>
    </div>

    <!-- 管理者モードトグル (隠し扉解除で出現) -->
    <div id="admin-panel" class="fixed top-4 right-4 z-50 hidden opacity-0 transition-opacity duration-500">
        <div class="flex items-center space-x-2 bg-white/90 backdrop-blur shadow-sm rounded-full px-4 py-2 border border-gray-100">
            <span class="text-xs text-red-500 font-bold"><i class="fas fa-lock-open mr-1"></i>管理者モード</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="edit-toggle" class="sr-only peer" onchange="toggleEditMode()">
                <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-red-400"></div>
            </label>
        </div>
    </div>

    <!-- メインヘッダー -->
    <header class="pt-16 pb-6 md:pb-8 px-4 text-center relative z-10">
        <!-- タイトル (5回タップで隠し扉) -->
        <h1 class="text-3xl md:text-5xl font-serif font-bold tracking-widest text-primary mb-6 md:mb-8 editable inline-block drop-shadow-md title-shadow" id="site-title" data-field="title" onclick="handleSecretClick()">私たちの日常</h1>
        
        <!-- アイコン画像 -->
        <div class="relative w-24 h-24 md:w-36 md:h-36 mx-auto group">
            <div class="w-full h-full rounded-full overflow-hidden shadow-xl border-[4px] md:border-[5px] border-white bg-white">
                <img id="profile-icon" src="" alt="Profile Icon" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1522529599102-193c0d76b5b6?q=80&w=400&auto=format&fit=crop'">
            </div>
            <!-- アイコン編集パネル -->
            <div class="edit-panel absolute -bottom-16 left-1/2 transform -translate-x-1/2 w-64 md:w-72 bg-white shadow-2xl rounded-lg p-3 border border-gray-100 z-20">
                <label class="text-[10px] text-gray-400 block mb-1 text-left">アイコン画像 (URL / アップロード)</label>
                <div class="flex space-x-2">
                    <input type="text" id="icon-url-input" class="w-full border rounded px-2 py-1.5 text-xs focus:outline-none focus:border-red-400" placeholder="画像のURL" onchange="updateProfileIcon(this.value)">
                    <label class="cursor-pointer bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1.5 rounded text-xs flex items-center justify-center whitespace-nowrap transition-colors">
                        <i class="fas fa-upload mr-1"></i>選択
                        <input type="file" class="hidden" accept="image/*" onchange="handleIconUpload(event)">
                    </label>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-2 sm:px-6 lg:px-8 py-4 w-full relative z-10" id="main-content">
        <!-- ★ グリッドコンテナ（スマホで2列、PCで3列に変更） -->
        <div class="grid grid-cols-2 lg:grid-cols-3 gap-x-2 gap-y-6 sm:gap-x-4 sm:gap-y-8 md:gap-x-6 md:gap-y-10" id="items-container">
            <div class="col-span-full text-center py-20 text-gray-400">
                <i class="fas fa-spinner fa-spin text-3xl mb-2"></i>
                <p class="text-sm">データを読み込んでいます...</p>
            </div>
        </div>
        
        <!-- 追加ボタン -->
        <div id="add-item-container" class="mt-12 md:mt-16 mb-8 text-center hidden">
            <button onclick="addNewItem()" class="bg-white/50 backdrop-blur border-2 border-dashed border-red-300 text-red-400 hover:border-red-500 hover:text-red-500 hover:bg-white/80 transition-all duration-300 px-6 py-4 md:px-8 md:py-6 rounded-2xl font-medium flex flex-col items-center justify-center mx-auto w-full max-w-xs md:max-w-sm group shadow-sm hover:shadow-md">
                <i class="fas fa-plus mb-2 md:mb-3 text-2xl md:text-3xl group-hover:scale-110 transition-transform"></i>
                <span class="tracking-wide text-xs md:text-base">新しいコーデ枠を追加する</span>
            </button>
        </div>
    </main>

    <footer class="bg-white/50 backdrop-blur border-t border-gray-100 mt-10 md:mt-16 relative z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8 text-center">
            <p class="text-xs md:text-sm text-gray-400 tracking-wider">&copy; 2026 <span class="editable" id="footer-title" data-field="footerTitle">私たちの日常</span>.</p>
        </div>
    </footer>

    <!-- パスワード入力モーダル -->
    <div id="password-modal" class="modal-overlay">
        <div class="bg-white rounded-2xl p-6 md:p-8 max-w-[300px] md:max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300" id="modal-content">
            <h3 class="text-base md:text-lg font-bold text-gray-800 mb-2 md:mb-4 text-center"><i class="fas fa-lock mr-2"></i>管理者認証</h3>
            <p class="text-[10px] md:text-xs text-gray-500 mb-4 text-center">編集モードに入るにはパスコードを入力してください。</p>
            <input type="password" id="secret-password" class="w-full border-b-2 border-gray-300 focus:border-red-400 outline-none py-2 text-center text-lg md:text-xl tracking-widest mb-6" placeholder="••••">
            <div class="flex space-x-2 md:space-x-3">
                <button onclick="closeModal()" class="flex-1 py-2 rounded-lg text-xs md:text-sm font-medium text-gray-500 hover:bg-gray-100 transition-colors">キャンセル</button>
                <button onclick="checkPassword()" class="flex-1 py-2 rounded-lg text-xs md:text-sm font-medium bg-gray-800 text-white hover:bg-black transition-colors shadow-md">ロック解除</button>
            </div>
            <p id="password-error" class="text-red-500 text-[10px] md:text-xs text-center mt-3 hidden">パスコードが違います</p>
        </div>
    </div>

    <!-- Firebase SDKのインポートとアプリのロジック -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        
        let db;
        let currentUser = null;
        let isEditMode = false;
        let isAdminAuthenticated = false;
        
        let itemsData = [];
        let siteData = {};
        let currentSlideStates = {};

        const defaultItemsData = [
            {
                id: "item_1",
                order: 0,
                title: "週末のカフェ巡りデート",
                isNew: true, // 新着フラグ
                slides: [
                    { image: "./07464D97-8ECF-4A43-9C81-8FE1C436DCD5.jpg", text: "春の新作リネンブラウス", url: "#affiliate-blouse" },
                    { image: "./88DA969F-D437-4DC4-97BD-38B9EB21635F.png", text: "シルエットが綺麗なスカート", url: "#affiliate-skirt" },
                    { image: "./BC3FF25E-C4C9-406C-AD2E-FE94AF8098F7.jpg", text: "合わせやすいパンプス", url: "#affiliate-shoes" },
                    { image: "./6E1F9E3D-C6B9-4E3C-9086-F278F393F689.jpg", text: "お気に入りのアクセサリー", url: "#affiliate-acc" } 
                ]
            }
        ];

        function getCollectionRef(colName) { return collection(db, 'artifacts', appId, 'public', 'data', colName); }
        function getDocRef(colName, docId) { return doc(db, 'artifacts', appId, 'public', 'data', colName, docId); }

        if (firebaseConfig) {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            db = getFirestore(app);

            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            
            initAuth().then(() => {
                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) setupRealtimeListeners();
                });
            });
        }

        function setupRealtimeListeners() {
            if (!currentUser) return;
            onSnapshot(getDocRef('settings', 'main'), (docSnap) => {
                if (docSnap.exists()) {
                    siteData = docSnap.data();
                    const siteTitleEl = document.getElementById('site-title');
                    const footerTitleEl = document.getElementById('footer-title');
                    
                    if(siteTitleEl && document.activeElement !== siteTitleEl) {
                        siteTitleEl.innerText = siteData.title || '私たちの日常';
                        document.title = siteData.title || '私たちの日常';
                    }
                    if(footerTitleEl && document.activeElement !== footerTitleEl) {
                        footerTitleEl.innerText = siteData.footerTitle || '私たちの日常';
                    }
                    document.getElementById('profile-icon').src = siteData.iconUrl || '';
                    const urlInput = document.getElementById('icon-url-input');
                    if(urlInput && document.activeElement !== urlInput) {
                        urlInput.value = (siteData.iconUrl && siteData.iconUrl.startsWith('data:image')) ? '(アップロードされた画像)' : (siteData.iconUrl || '');
                    }
                } else {
                    setDoc(getDocRef('settings', 'main'), { title: '私たちの日常', footerTitle: '私たちの日常', iconUrl: './FCD34416-7E55-4C15-B0E4-B613D87FA0A5.png' });
                }
            }, (error) => console.error("Settings error:", error));

            let isItemsInitialized = false;
            onSnapshot(getCollectionRef('items'), (snapshot) => {
                let loadedItems = [];
                snapshot.forEach(doc => loadedItems.push({ id: doc.id, ...doc.data() }));
                
                if (loadedItems.length === 0 && !isItemsInitialized) {
                    isItemsInitialized = true;
                    defaultItemsData.forEach(async (item) => {
                        await setDoc(getDocRef('items', item.id), { order: item.order, title: item.title, slides: item.slides, isNew: item.isNew });
                    });
                } else {
                    loadedItems.sort((a, b) => (b.order || 0) - (a.order || 0)); // 新しいものが上に来るように降順にソート変更
                    loadedItems.forEach(item => { item.currentSlide = currentSlideStates[item.id] !== undefined ? currentSlideStates[item.id] : 0; });
                    itemsData = loadedItems;
                    renderItems();
                }
            }, (error) => console.error("Items error:", error));
        }

        // --- 隠し扉（シークレットモード） ---
        let clickCount = 0;
        let clickTimer = null;
        const SECRET_PASSCODE = "0000";

        window.handleSecretClick = function() {
            if (isEditMode) return;
            clickCount++;
            if (clickTimer) clearTimeout(clickTimer);
            
            if (clickCount >= 5) {
                clickCount = 0;
                document.getElementById('password-modal').classList.add('active');
                document.getElementById('modal-content').classList.remove('scale-95');
                document.getElementById('modal-content').classList.add('scale-100');
                document.getElementById('secret-password').focus();
            }
            clickTimer = setTimeout(() => { clickCount = 0; }, 1500);
        };

        window.closeModal = function() {
            document.getElementById('password-modal').classList.remove('active');
            document.getElementById('modal-content').classList.remove('scale-100');
            document.getElementById('modal-content').classList.add('scale-95');
            document.getElementById('secret-password').value = '';
            document.getElementById('password-error').classList.add('hidden');
        };

        window.checkPassword = function() {
            const input = document.getElementById('secret-password').value;
            if (input === SECRET_PASSCODE) {
                isAdminAuthenticated = true;
                closeModal();
                const panel = document.getElementById('admin-panel');
                panel.classList.remove('hidden');
                setTimeout(() => panel.classList.remove('opacity-0'), 50);
            } else {
                document.getElementById('password-error').classList.remove('hidden');
                document.getElementById('secret-password').value = '';
                document.getElementById('secret-password').focus();
            }
        };

        document.getElementById('secret-password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') window.checkPassword();
        });

        // ----------------------------------------

        function renderItems() {
            const container = document.getElementById('items-container');
            if(itemsData.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400 text-xs">コーデがありません</div>';
                return;
            }
            
            container.innerHTML = '';
            itemsData.forEach((item) => {
                let validSlides = item.slides.filter(s => s.image && s.image.trim() !== '').slice(0, 4);
                if (validSlides.length === 0) validSlides = [{ image: "https://placehold.co/600x800/eeeeee/999999?text=No+Image", text: "アイテムを追加してください", url: "#" }];
                if (item.currentSlide >= validSlides.length) item.currentSlide = 0;
                
                const activeSlide = validSlides[item.currentSlide];
                const itemId = `item-${item.id}`;
                
                const itemHTML = `
                    <div class="glass-card rounded-2xl md:rounded-[2rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-500 flex flex-col h-full relative group" id="${itemId}">
                        
                        <!-- ★ 新着バッジ -->
                        ${item.isNew ? `
                            <div class="absolute top-0 left-0 bg-red-500 text-white text-[10px] md:text-xs font-bold px-3 py-1 rounded-br-xl md:rounded-br-2xl rounded-tl-2xl md:rounded-tl-[2rem] shadow-md z-20 tracking-wider">
                                新着
                            </div>
                        ` : ''}

                        <button onclick="window.deleteItem('${item.id}')" class="absolute -top-2 -right-2 md:-top-3 md:-right-3 z-30 bg-white border border-red-100 text-red-500 w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center opacity-0 transition-all transform scale-50 hover:bg-red-50 hover:scale-110 edit-panel shadow-lg">
                            <i class="fas fa-trash-alt text-xs md:text-base"></i>
                        </button>

                        <div class="px-3 pt-5 pb-2 md:px-6 md:pt-7 md:pb-4 text-center z-10 relative">
                            <h2 class="text-sm md:text-xl font-serif font-bold text-primary editable leading-tight" data-item-id="${item.id}" data-field="title" contenteditable="${isEditMode}">${item.title || '題名を入力'}</h2>
                        </div>

                        <div class="relative w-full aspect-[3/4] overflow-hidden bg-gray-100">
                            <div class="flex h-full w-full carousel-inner" id="slider-${item.id}" style="transform: translateX(-${item.currentSlide * 100}%);">
                                ${validSlides.map((slide) => `
                                    <div class="w-full h-full flex-shrink-0 relative">
                                        <img src="${slide.image}" alt="Fashion Style" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/600x800/f8d7da/721c24?text=Image+Error'">
                                        <div class="absolute bottom-0 w-full h-12 md:h-20 bg-gradient-to-t from-black/40 to-transparent"></div>
                                    </div>
                                `).join('')}
                            </div>

                            ${validSlides.length > 1 ? `
                                <button onclick="window.moveSlide('${item.id}', -1)" class="absolute left-2 md:left-3 top-1/2 transform -translate-y-1/2 w-6 h-6 md:w-10 md:h-10 bg-white/80 backdrop-blur-md rounded-full flex items-center justify-center text-gray-800 shadow-lg opacity-0 group-hover:opacity-100 transition-all hover:bg-white hover:scale-110 z-10 ${item.currentSlide === 0 ? 'hidden' : ''}" id="prev-btn-${item.id}"><i class="fas fa-chevron-left text-[10px] md:text-sm"></i></button>
                                <button onclick="window.moveSlide('${item.id}', 1)" class="absolute right-2 md:right-3 top-1/2 transform -translate-y-1/2 w-6 h-6 md:w-10 md:h-10 bg-white/80 backdrop-blur-md rounded-full flex items-center justify-center text-gray-800 shadow-lg opacity-0 group-hover:opacity-100 transition-all hover:bg-white hover:scale-110 z-10 ${item.currentSlide === validSlides.length - 1 ? 'hidden' : ''}" id="next-btn-${item.id}"><i class="fas fa-chevron-right text-[10px] md:text-sm"></i></button>
                                <div class="absolute bottom-3 md:bottom-5 left-0 right-0 flex justify-center space-x-1.5 md:space-x-2 z-10">
                                    ${validSlides.map((_, i) => `<div class="w-1 h-1 md:w-1.5 md:h-1.5 rounded-full transition-all duration-300 shadow-sm ${i === item.currentSlide ? 'bg-white w-3 md:w-4' : 'bg-white/50'}"></div>`).join('')}
                                </div>
                            ` : ''}
                        </div>

                        <div class="edit-panel bg-red-50/80 border-t border-red-100 relative z-10">
                            <!-- ★ 新着フラグのトグル -->
                            <div class="p-3 border-b border-red-100 flex items-center justify-between">
                                <span class="text-[10px] md:text-xs font-bold text-red-500"><i class="fas fa-tag mr-1"></i>新着マーク</span>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" class="sr-only peer" ${item.isNew ? 'checked' : ''} onchange="window.updateItemData('${item.id}', 'isNew', this.checked)">
                                    <div class="w-7 h-4 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-red-400"></div>
                                </label>
                            </div>
                            
                            <div class="p-3 max-h-48 overflow-y-auto">
                                ${item.slides.map((slide, index) => `
                                    <div class="mb-3 pb-3 border-b border-red-100/50 last:border-0 last:mb-0 last:pb-0">
                                        <div class="text-[10px] font-bold text-red-400 mb-1">スライド ${index + 1}</div>
                                        <div class="space-y-1.5">
                                            <div class="flex space-x-1">
                                                <input type="text" class="w-full border border-gray-200 rounded px-1.5 py-1 text-[10px] focus:outline-none focus:border-red-400 bg-white" value="${slide.image.startsWith('data:image') ? '(アップロードされた画像)' : slide.image}" onchange="window.updateSlideData('${item.id}', ${index}, 'image', this.value)" placeholder="画像のURL">
                                                <label class="cursor-pointer bg-white border border-gray-200 hover:bg-red-50 text-gray-600 px-1.5 py-1 rounded text-[10px] flex items-center whitespace-nowrap">
                                                    <i class="fas fa-upload"></i>
                                                    <input type="file" class="hidden" accept="image/*" onchange="window.handleSlideUpload(event, '${item.id}', ${index})">
                                                </label>
                                            </div>
                                            <input type="text" class="w-full border border-gray-200 rounded px-1.5 py-1 text-[10px] focus:outline-none focus:border-red-400 bg-white" value="${slide.text}" onchange="window.updateSlideData('${item.id}', ${index}, 'text', this.value)" placeholder="リンクテキスト">
                                            <input type="text" class="w-full border border-gray-200 rounded px-1.5 py-1 text-[10px] focus:outline-none focus:border-red-400 bg-white" value="${slide.url}" onchange="window.updateSlideData('${item.id}', ${index}, 'url', this.value)" placeholder="アフィリエイトURL">
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="p-3 md:p-5 flex-grow flex flex-col justify-center items-center bg-transparent relative z-10">
                            <!-- ★ 商品への誘導テキストと指差しアニメーション -->
                            <div class="text-[9px] md:text-[11px] text-accent font-bold mb-2 flex items-center tracking-wider">
                                <i class="fas fa-hand-point-down mr-1.5 animate-bounce"></i>
                                商品はここから
                                <i class="fas fa-hand-point-down ml-1.5 animate-bounce"></i>
                            </div>
                            
                            <a href="${activeSlide.url}" id="link-anchor-${item.id}" class="affiliate-link group flex items-center justify-center w-11/12 bg-white/90 hover:bg-accent border border-gray-200 hover:border-accent rounded-full py-2.5 md:py-3 px-3 shadow-sm hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-300" target="_blank" rel="noopener noreferrer">
                                <!-- ★ バッグから洋服(Tシャツ)のアイコンに変更 -->
                                <i class="fas fa-tshirt text-[10px] md:text-xs text-accent group-hover:text-white mr-2 transition-colors"></i>
                                <span class="fade-transition text-[11px] md:text-sm font-serif font-bold text-gray-700 group-hover:text-white leading-snug truncate" id="link-text-${item.id}">${activeSlide.text || 'リンクを設定'}</span>
                                <i class="fas fa-chevron-right text-[8px] md:text-[10px] text-gray-300 group-hover:text-white/80 ml-auto md:ml-2 transition-colors"></i>
                            </a>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHTML);
            });
            updateEditModeUI();
            setupContentEditableListeners();
        }

        window.moveSlide = function(itemId, direction) {
            const item = itemsData.find(i => i.id === itemId);
            if (!item) return;
            const validSlides = item.slides.filter(s => s.image && s.image.trim() !== '').slice(0, 4);
            const maxSlides = validSlides.length;
            if (maxSlides <= 1) return;

            let newSlide = item.currentSlide + direction;
            if (newSlide < 0 || newSlide >= maxSlides) return;
            item.currentSlide = newSlide;
            currentSlideStates[itemId] = newSlide;

            const sliderElement = document.getElementById(`slider-${itemId}`);
            if (sliderElement) sliderElement.style.transform = `translateX(-${newSlide * 100}%)`;

            const prevBtn = document.getElementById(`prev-btn-${itemId}`);
            const nextBtn = document.getElementById(`next-btn-${itemId}`);
            if(prevBtn) prevBtn.classList.toggle('hidden', newSlide === 0);
            if(nextBtn) nextBtn.classList.toggle('hidden', newSlide === maxSlides - 1);

            const indicators = sliderElement?.nextElementSibling?.nextElementSibling;
            if(indicators && indicators.classList.contains('flex')) {
               Array.from(indicators.children).forEach((dot, i) => { dot.className = `w-1 h-1 md:w-1.5 md:h-1.5 rounded-full transition-all duration-300 shadow-sm ${i === newSlide ? 'bg-white w-3 md:w-4' : 'bg-white/50'}`; });
            }

            const activeSlideData = validSlides[newSlide];
            const linkAnchor = document.getElementById(`link-anchor-${itemId}`);
            const linkTextEl = document.getElementById(`link-text-${itemId}`);

            if (linkAnchor && linkTextEl) {
                linkTextEl.style.opacity = 0;
                setTimeout(() => {
                    linkAnchor.href = activeSlideData.url || '#';
                    linkTextEl.innerText = activeSlideData.text || 'リンクを設定';
                    linkTextEl.style.opacity = 1;
                }, 150);
            }
        };

        window.toggleEditMode = function() {
            if (!isAdminAuthenticated) return;
            isEditMode = document.getElementById('edit-toggle').checked;
            document.body.classList.toggle('edit-mode', isEditMode);
            document.getElementById('add-item-container').classList.toggle('hidden', !isEditMode);
            
            document.querySelectorAll('.edit-panel.rounded-full').forEach(btn => {
                btn.classList.toggle('scale-100', isEditMode);
                btn.classList.toggle('opacity-100', isEditMode);
                btn.classList.toggle('scale-50', !isEditMode);
                btn.classList.toggle('opacity-0', !isEditMode);
            });
            updateEditModeUI();
        };

        function updateEditModeUI() { document.querySelectorAll('.editable').forEach(el => el.setAttribute('contenteditable', isEditMode)); }

        function setupContentEditableListeners() {
            document.querySelectorAll('.editable').forEach(el => {
                el.removeEventListener('blur', handleBlur);
                el.addEventListener('blur', handleBlur);
                el.removeEventListener('keydown', handleKeydown);
                el.addEventListener('keydown', handleKeydown);
            });

            function handleBlur(e) {
                if (!isEditMode || !currentUser || !isAdminAuthenticated) return;
                const itemId = this.getAttribute('data-item-id');
                const field = this.getAttribute('data-field');
                const newValue = this.innerText.trim();

                if (itemId && field) { updateDoc(getDocRef('items', itemId), { [field]: newValue });
                } else {
                    const docRef = getDocRef('settings', 'main');
                    if (this.id === 'site-title') { updateDoc(docRef, { title: newValue, footerTitle: newValue });
                    } else if (this.id === 'footer-title') { updateDoc(docRef, { footerTitle: newValue }); }
                }
            }
            function handleKeydown(e) { if (e.key === 'Enter') { e.preventDefault(); this.blur(); } }
        }

        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height; const MAX_SIZE = 800;
                    if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE;
                    } else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.updateProfileIcon = function(url) {
            if (!currentUser || !isAdminAuthenticated || url === '(アップロードされた画像)') return;
            updateDoc(getDocRef('settings', 'main'), { iconUrl: url });
        };
        window.handleIconUpload = function(event) {
            const file = event.target.files[0];
            if (file) compressImage(file, (compressedUrl) => window.updateProfileIcon(compressedUrl));
        };

        // 新着フラグ等、スライド以外の個別データの更新用
        window.updateItemData = function(itemId, field, value) {
            if (!currentUser || !isAdminAuthenticated) return;
            updateDoc(getDocRef('items', itemId), { [field]: value });
        };

        window.updateSlideData = function(itemId, slideIndex, field, value) {
            if (!currentUser || !isAdminAuthenticated || (field === 'image' && value === '(アップロードされた画像)')) return;
            const item = itemsData.find(i => i.id === itemId);
            if (item && item.slides[slideIndex]) {
                const updatedSlides = [...item.slides];
                updatedSlides[slideIndex] = { ...updatedSlides[slideIndex], [field]: value };
                updateDoc(getDocRef('items', itemId), { slides: updatedSlides });
            }
        };
        window.handleSlideUpload = function(event, itemId, slideIndex) {
            const file = event.target.files[0];
            if (file) compressImage(file, (compressedUrl) => window.updateSlideData(itemId, slideIndex, 'image', compressedUrl));
        };

        window.addNewItem = async function() {
            if (!currentUser || !isAdminAuthenticated) return;
            // 新しく追加したものが一番上に来るようにorderの最大値+1にする
            const newOrder = itemsData.length > 0 ? Math.max(...itemsData.map(i => i.order || 0)) + 1 : 0;
            await addDoc(getCollectionRef('items'), {
                order: newOrder, 
                title: "新しいコーデ",
                isNew: true, // 新規追加時は自動的に新着をONにする
                slides: [
                    { image: "", text: "", url: "" }, { image: "", text: "", url: "" },
                    { image: "", text: "", url: "" }, { image: "", text: "", url: "" }
                ]
            });
        };

        window.deleteItem = async function(itemId) {
            if (!currentUser || !isAdminAuthenticated) return;
            const el = document.getElementById(`item-${itemId}`);
            if(el) {
                el.style.opacity = '0'; el.style.transform = 'scale(0.95) translateY(10px)';
                setTimeout(async () => { await deleteDoc(getDocRef('items', itemId)); }, 300);
            }
        };

    </script>
</body>
</html>
